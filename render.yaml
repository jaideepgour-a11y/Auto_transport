# Render.com deployment configuration
# Docs: https://render.com/docs/render-yaml

services:
  - type: web
    name: shivani-driver-tracking
    runtime: python
    plan: free                          # Change to "starter" ($7/mo) for always-on
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health

    envVars:
      - key: WHATSAPP_TOKEN
        sync: false                     # You fill this in Render dashboard

      - key: WHATSAPP_PHONE_ID
        sync: false

      - key: WHATSAPP_VERIFY_TOKEN
        sync: false

      - key: SUPPORT_MOBILE
        sync: false

      - key: META_API_VERSION
        value: v19.0

      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./shivani_tracking.db

      - key: FOLLOWUP_INTERVAL_SECONDS
        value: "21600"

      - key: SCHEDULER_POLL_SECONDS
        value: "60"

      - key: PYTHON_VERSION
        value: "3.11.0"
